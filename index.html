<!  <!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB | Login & Join</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --sb-pink: #ff0080; --sb-purple: #7928ca; --sb-blue: #1877f2; }
        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--sb-pink), var(--sb-purple), var(--sb-blue));
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .auth-card {
            background: white; width: 90%; max-width: 400px; padding: 35px;
            border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center;
        }
        .logo-circle {
            width: 65px; height: 65px; background: white; color: var(--sb-pink);
            margin: -70px auto 15px; border-radius: 50%; display: grid;
            place-items: center; font-weight: 800; border: 4px solid var(--sb-pink); font-size: 24px;
        }
        h2 { margin: 0 0 5px 0; color: #333; }
        input, select {
            width: 100%; padding: 12px 18px; margin: 8px 0; border-radius: 25px;
            border: 1px solid #eee; background: #f8f9fa; outline: none; box-sizing: border-box; font-family: 'Poppins';
        }
        .btn-main {
            width: 100%; padding: 14px; margin-top: 15px;
            background: linear-gradient(to right, var(--sb-pink), var(--sb-purple));
            color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); }
        .switch-link { color: var(--sb-purple); cursor: pointer; font-weight: 600; font-size: 13px; text-decoration: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-circle">SB</div>

    <div id="loginForm">
        <h2>Welcome Back</h2>
        <p style="font-size:12px; color:#777; margin-bottom:20px;">RK Excellent Coaching - Digital Hub</p>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">LOGIN NOW</button>
        <div style="margin-top:20px;">
            <span class="switch-link" onclick="toggleForm('forgot')">Forgot Password?</span><br><br>
            Don't have an account? <span class="switch-link" onclick="toggleForm('signup')">Sign Up</span>
        </div>
    </div>

    <div id="signupForm" class="hidden">
        <h2>Create Account</h2>
        <p style="font-size:12px; color:#2ecc71;">🎁 Join & Get 50 Welcome Points</p>
        <input type="text" id="signName" placeholder="Full Name">
        <select id="signLevel">
            <option disabled selected>Select Your Level</option>
            <option>Class 6th-10th</option>
            <option>Plus 2 (+2)</option>
            <option>UPSC / OPSC</option>
            <option>OSSC / Railway</option>
            <option>PhD / Higher Ed</option>
        </select>
        <input type="email" id="signEmail" placeholder="Email Address">
        <input type="password" id="signPass" placeholder="Create Password">
        <button class="btn-main" onclick="handleSignup()">SIGNUP & EARN</button>
        <div style="margin-top:20px;">
            Already have an account? <span class="switch-link" onclick="toggleForm('login')">Login</span>
        </div>
    </div>

    <div id="forgotForm" class="hidden">
        <h2>Reset Password</h2>
        <p style="font-size:12px; color:#777;">Enter your email to get reset link</p>
        <input type="email" id="resetEmail" placeholder="Your Registered Email">
        <button class="btn-main" onclick="handleReset()">SEND RESET LINK</button>
        <div style="margin-top:20px;">
            <span class="switch-link" onclick="toggleForm('login')">Back to Login</span>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
    // --- APNI FIREBASE CONFIG YAHAN PASTE KAREIN ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Toggle logic
    function toggleForm(type) {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('forgotForm').classList.add('hidden');
        document.getElementById(type + 'Form').classList.remove('hidden');
    }

    // Login Logic
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        if(!email || !pass) return alert("Details bhariye!");

        auth.signInWithEmailAndPassword(email, pass)
            .then(() => { window.location.href = "home.html"; })
            .catch(err => alert(err.message));
    }

    // Signup Logic
    function handleSignup() {
        const email = document.getElementById('signEmail').value;
        const pass = document.getElementById('signPass').value;
        const name = document.getElementById('signName').value;
        const level = document.getElementById('signLevel').value;

        if(!email || !pass || !name) return alert("Details bhariye!");

        auth.createUserWithEmailAndPassword(email, pass).then(cred => {
            return db.collection('users').doc(cred.user.uid).set({
                name: name, education_level: level, points: 50, wallet: 0
            });
        }).then(() => {
            alert("Account Created! 50 Points Added 🎁");
            window.location.href = "home.html";
        }).catch(err => alert(err.message));
    }

    // Reset Logic
    function handleReset() {
        const email = document.getElementById('resetEmail').value;
        if(!email) return alert("Email jaruri hai!");
        auth.sendPasswordResetEmail(email)
            .then(() => alert("Reset link sent!"))
            .catch(err => alert(err.message));
    }
</script>

</body>
</html>
